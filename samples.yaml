apiVersion: v1
kind: Secret
metadata:
  name: my-secret        # Name used to reference the secret
  namespace: default     # (Optional) Targeted namespace
type: Opaque             # Default type for arbitrary key-value pairs
data:
  # Values must be base64 encoded
  username: YWRtaW4=     # "admin"
  password: bwYzd29ZZA== # "mypassword"
stringData:
  # Values can be plain text (for convenience)
  api-key: "12345-abcde"
